name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run examples
        run: |
          python perception/a-context-triage/example.py
          python perception/b-semantic-compaction/example.py
          python perception/c-progressive-discovery/example.py
          python perception/d-multimodal-fusion/example.py
      - name: Run tests
        run: pytest -v
