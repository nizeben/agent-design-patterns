name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run examples
        run: |
          python perception/a-context-triage/example.py
          python perception/b-semantic-compaction/example.py
          python perception/c-progressive-discovery/example.py
          python perception/d-multimodal-fusion/example.py
          python memory/a-hierarchical-retention/example.py
          python memory/b-rag/example.py
          python memory/c-progress-tracking/example.py
          python memory/d-failure-journals/example.py
          python reasoning/a-chain-of-thought/example.py
          python reasoning/b-complexity-routing/example.py
          python reasoning/c-parallel-exploration/example.py
          python reasoning/d-iterative-hypothesis/example.py
          python action/a-tool-dispatch/example.py
          python action/b-plan-and-execute/example.py
          python action/c-prompt-chaining/example.py
          python action/d-guardrail-sandwich/example.py
      - name: Run tests
        run: pytest -v
